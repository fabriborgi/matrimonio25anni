<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25° Anniversario di Matrimonio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #FFFFFF;
      --black: #1A1A1A;
      --gold: #D4AF37;
      --beige: #F5F5DC;
      --title-font: "Playfair Display", serif;
      --text-font: "Montserrat", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--text-font);
      color: var(--black);
      background: var(--white);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    h1,
    h2,
    h3,
    summary {
      font-family: var(--title-font);
      font-weight: 700;
    }

    a {
      color: inherit;
    }

    /* 1) Bottone audio fluttuante */
    .audio-fab {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 50%;
      background: var(--gold);
      color: var(--black);
      font-size: 1.35rem;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
      z-index: 50;
      cursor: pointer;
    }

    .audio-fab:focus-visible {
      outline: 2px solid var(--white);
      outline-offset: 2px;
    }

    /* 2) Hero con VIDEO MP4 parallax zoom-out */
    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--black);
      overflow: hidden;
      text-align: center;
      color: var(--white);
      isolation: isolate;
    }

    .hero__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.18);
      transform-origin: center center;
      z-index: -1;
      will-change: transform;
    }

    .hero__bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.6));
      z-index: 1;
    }

    .hero__content {
      padding: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .hero__names {
      font-size: clamp(2rem, 9vw, 3.8rem);
      letter-spacing: 0.02em;
      margin-bottom: 0.6rem;
    }

    .hero__subtitle {
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* 3) Carousel galleria con foto REALI matri*.jpeg */
    .gallery {
      display: flex;
      gap: 0.9rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 1rem;
      background: var(--beige);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery__item {
      flex: 0 0 86%;
      scroll-snap-align: center;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(26, 26, 26, 0.16);
      border: 1px solid rgba(212, 175, 55, 0.35);
      background: var(--white);
    }

    .gallery__item img {
      display: block;
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    /* 4) Countdown + Nuova frase */
    .countdown {
      padding: 2.4rem 1rem;
      text-align: center;
      background: var(--white);
    }

    .countdown h2 {
      color: var(--gold);
      font-size: clamp(1.8rem, 7vw, 2.5rem);
      margin-bottom: 1.2rem;
    }

    .countdown__grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 0.75rem;
      max-width: 420px;
      margin: 0 auto 1.5rem;
    }

    .countdown__box {
      background: var(--black);
      color: var(--white);
      border-radius: 12px;
      border: 1px solid rgba(212, 175, 55, 0.4);
      padding: 0.85rem 0.5rem;
    }

    .countdown__value {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.1;
    }

    .countdown__label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-top: 0.3rem;
    }

    /* Nuova frase sotto countdown */
    .countdown__stats {
      max-width: 600px;
      margin: 0 auto;
      font-family: var(--title-font);
      font-size: 1.1rem;
      color: var(--black);
      font-weight: 500;
      line-height: 1.4;
    }

    /* Resto del CSS invariato */
    .invitation {
      background: var(--beige);
      padding: 2.4rem 1rem;
    }

    .invitation__box {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      background: var(--white);
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 1.5rem 1.2rem;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
    }

    .invitation__box h2 {
      color: var(--gold);
      margin-bottom: 1rem;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
    }

    .invitation__box p {
      margin-bottom: 0.95rem;
      font-size: 0.98rem;
    }

    .invitation__rsvp {
      font-weight: 600;
      color: var(--black);
    }

    .invitation__signature {
      font-family: var(--title-font);
      font-style: italic;
      color: var(--gold);
      font-size: 1.35rem;
      margin-top: 0.6rem;
    }

    .info {
      background: var(--white);
      padding: 2.4rem 0 2.7rem;
    }

    .info__title {
      text-align: center;
      color: var(--black);
      margin-bottom: 1rem;
      padding: 0 1rem;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
    }

    .info__carousel {
      display: flex;
      gap: 0.9rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 0 1rem 0.4rem;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .info__carousel::-webkit-scrollbar {
      display: none;
    }

    .info__card {
      flex: 0 0 88%;
      scroll-snap-align: start;
      background: var(--beige);
      border: 1px solid rgba(212, 175, 55, 0.45);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 6px 18px rgba(26, 26, 26, 0.1);
    }

    .info__icon {
      font-size: 1.7rem;
      margin-bottom: 0.35rem;
    }

    .info__card h3 {
      color: var(--gold);
      margin-bottom: 0.45rem;
      font-size: 1.35rem;
    }

    .info__card p {
      font-size: 0.93rem;
      margin-bottom: 0.5rem;
    }

    .info__phone {
      display: inline-block;
      margin-top: 0.4rem;
      font-weight: 600;
      color: var(--black);
      text-decoration: none;
      border-bottom: 1px solid rgba(26, 26, 26, 0.5);
    }

    .info__map {
      margin-top: 0.45rem;
      width: 100%;
      border: 0;
      border-radius: 10px;
      min-height: 180px;
    }

    .footer-faq {
      background: var(--black);
      color: var(--white);
      padding: 2.5rem 1rem 2rem;
    }

    .footer-faq h2 {
      color: var(--gold);
      text-align: center;
      margin-bottom: 1rem;
      font-size: clamp(1.6rem, 6vw, 2rem);
    }

    .faq {
      max-width: 760px;
      margin: 0 auto;
    }

    .faq details {
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.75rem 0;
    }

    .faq summary {
      list-style: none;
      cursor: pointer;
      color: var(--white);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.9rem;
    }

    .faq summary::-webkit-details-marker {
      display: none;
    }

    .faq summary::after {
      content: "+";
      color: var(--gold);
      font-size: 1.3rem;
      line-height: 1;
    }

    .faq details[open] summary::after {
      content: "−";
    }

    .faq p {
      margin-top: 0.5rem;
      color: #e8e8e8;
      font-size: 0.94rem;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.4rem;
      color: var(--gold);
      font-family: var(--title-font);
      font-style: italic;
      font-size: 1rem;
    }

    @media (min-width: 768px) {
      .gallery,
      .info__carousel {
        justify-content: center;
      }

      .gallery__item {
        flex-basis: min(480px, 60vw);
      }

      .info__card {
        flex-basis: min(420px, 45vw);
      }

      .countdown__grid {
        grid-template-columns: repeat(4, minmax(100px, 1fr));
        max-width: 560px;
      }

      .audio-fab {
        right: 22px;
        bottom: 22px;
      }
    }
  </style>
</head>
<body>
  <!-- 1. Bottone Audio Fluttuante -->
  <audio id="bg-audio" loop preload="none">
    <source src="aerosmith.mp3" type="audio/mpeg">
  </audio>
  <button class="audio-fab" id="audio-toggle" aria-label="Attiva musica" title="Play / Pausa">🎵</button>

  <header class="hero">

  <section class="countdown" aria-labelledby="countdown-title">

        <span class="countdown__label">Ore</span>
      </div>
      <div class="countdown__box">
        <span class="countdown__value" id="minutes">00</s
